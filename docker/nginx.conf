server {
    listen 8080;
    server_name _;
    root /var/www/app/public;
    index index.php;

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }
}
